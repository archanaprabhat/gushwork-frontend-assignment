<!DOCTYPE html>
<html lang="en">
  <head>

    <title>Mangalam HDPE Pipes – Premium HDPE Pipes & Coils</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="sticky-bar" id="stickyBar">
      <div class="container">
        <div class="sb__inner">
          <div class="sb__left">
            <div class="sb__thumb">
              <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=160&q=70" alt="Product" />
            </div>
            <div class="sb__info">
              <p class="sb__title">Premium HDPE Pipes &amp; Coils for Modern Infrastructure</p>
              <p class="sb__price">₹4,80,000 – 7,90,000</p>
            </div>
          </div>
          <button class="sb__btn">Get Custom Quote</button>
        </div>
      </div>
    </div>

    <nav class="main-nav" id="mainNav">
      <div class="container">
        <div class="nav__inner">
          <a href="#" class="brand">
            <div class="brand__text">
              <span class="brand__name">Mangalam</span>
              <span class="brand__sub">HDPE | PIPES</span>
            </div>
          </a>

          <ul class="nav__links">
            <li><a href="#">About Us</a></li>
            <li>
              <a href="#">
                Products
              </a>
            </li>
          </ul>

          <button class="btn btn-primary btn-sm nav__cta">Contact Us</button>

          <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
          </button>
        </div>

        <div class="mobile-menu" id="mobileMenu">
          <a href="#">About Us</a>
          <a href="#">Products</a>
          <button class="btn btn-primary btn-full">Contact Us</button>
        </div>
      </div>
    </nav>

    <div class="breadcrumb">
      <div class="container">
        <a href="#">Products</a>
        <span class="bc__sep">›</span>
        <span>Two For One Twister</span>
      </div>
    </div>

    <main>
      <section class="hero">
        <div class="container">
          <div class="hero__grid">
            <div class="hero__gallery">
              <div class="hero__main-img">
                <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=900&q=85" alt="Premium HDPE Pipes" />
              </div>
            </div>

            <div class="hero__info">
